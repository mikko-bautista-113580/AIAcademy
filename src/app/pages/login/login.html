<section class="relative min-h-screen overflow-hidden bg-dark flex items-center justify-center">
  <!-- Animated Background -->
  <div class="absolute inset-0">
    <div class="absolute inset-0 bg-gradient-to-br from-dark via-dark-light to-dark"></div>
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/20 rounded-full blur-3xl float-animation"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary/20 rounded-full blur-3xl float-animation-delayed"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl"></div>
    <!-- Grid Pattern -->
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px); background-size: 60px 60px;"></div>
  </div>

  <!-- Login Card -->
  <div class="relative z-10 w-full max-w-md mx-auto px-4">
    <div class="login-card rounded-3xl border border-white/10 bg-white/[0.04] backdrop-blur-xl overflow-hidden pulse-glow">
      <!-- Gradient accent -->
      <div class="h-1 bg-gradient-to-r from-primary via-secondary to-primary"></div>

      <div class="p-8 sm:p-10">
        <!-- Logo & Branding -->
        <div class="text-center mb-8">
          <div class="flex items-center justify-center mb-5">
            <img src="npiaiLogo.png" alt="NPI AI Academy" class="w-16 h-16 rounded-2xl shadow-lg shadow-primary/30 object-cover">
          </div>
          <h1 class="text-2xl sm:text-3xl font-extrabold text-white mb-2 tracking-tight">
            NPI AI Academy
          </h1>
          <p class="text-slate-400 text-sm">
            Sign in with your Microsoft account to continue
          </p>
        </div>

        <!-- Divider -->
        <div class="border-t border-white/[0.06] mb-8"></div>

        <!-- Sign In Button -->
        <button
          class="sign-in-btn w-full flex items-center justify-center gap-3 px-6 py-4 rounded-2xl bg-gradient-to-r from-[#2F2F2F] to-[#1a1a2e] border border-white/15 text-white font-semibold text-base hover:border-white/25 disabled:opacity-50 disabled:cursor-not-allowed"
          (click)="signIn()"
          [disabled]="isLoading">
          @if (isLoading) {
            <svg class="spinner w-5 h-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>Signing in...</span>
          } @else {
            <!-- Microsoft Logo -->
            <svg class="w-5 h-5" viewBox="0 0 21 21" fill="none">
              <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
              <rect x="11" y="1" width="9" height="9" fill="#7FBA00"/>
              <rect x="1" y="11" width="9" height="9" fill="#00A4EF"/>
              <rect x="11" y="11" width="9" height="9" fill="#FFB900"/>
            </svg>
            <span>Sign in with Microsoft</span>
          }
        </button>

        <!-- Error Message -->
        @if (errorMessage) {
          <div class="mt-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
            {{ errorMessage }}
          </div>
        }

        <!-- Info -->
        <div class="mt-8 text-center">
          <p class="text-slate-500 text-xs leading-relaxed">
            Access is restricted to authorized Microsoft accounts only.
            <br>Contact your administrator if you need access.
          </p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-slate-600 text-xs mt-6">
      Powered by Microsoft Entra ID
    </p>
  </div>
</section>
