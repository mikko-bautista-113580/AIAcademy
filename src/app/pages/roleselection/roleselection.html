<section class="relative min-h-screen overflow-hidden bg-dark flex items-center justify-center">
  <!-- Animated Background -->
  <div class="absolute inset-0">
    <div class="absolute inset-0 bg-gradient-to-br from-dark via-dark-light to-dark"></div>
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/20 rounded-full blur-3xl float-animation"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-secondary/20 rounded-full blur-3xl float-animation-delayed"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl"></div>
    <!-- Grid Pattern -->
    <div class="absolute inset-0 opacity-[0.03]" style="background-image: linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px); background-size: 60px 60px;"></div>
  </div>

  <!-- Content -->
  <div class="relative z-10 w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <!-- Header -->
    <div class="text-center mb-12">
      <div class="flex items-center justify-center gap-3 mb-6">
        <img src="npiaiLogo.png" alt="NPI AI Academy" class="w-14 h-14 rounded-2xl shadow-lg shadow-primary/30 object-cover">
      </div>
      <h1 class="text-4xl sm:text-5xl font-extrabold text-white mb-4 tracking-tight">
        Welcome to <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">NPI AI Academy</span>
      </h1>
      <p class="text-lg sm:text-xl text-slate-400 max-w-2xl mx-auto">
        Select your role to get a personalized AI learning experience
      </p>
    </div>

    <!-- Role Cards Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 max-w-4xl mx-auto">
      @for (item of roles; track item.role) {
        <button
          class="role-card group relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-sm p-6 text-left transition-all duration-300 hover:scale-[1.03] hover:border-white/20 hover:bg-white/10 hover:shadow-2xl hover:shadow-primary/10 cursor-pointer"
          (click)="selectRole(item.role)">
          <!-- Gradient overlay on hover -->
          <div class="absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-10 transition-opacity duration-300"
               [class]="item.gradient"></div>

          <!-- Icon -->
          <div class="relative mb-4">
            <div class="w-14 h-14 rounded-xl bg-gradient-to-br flex items-center justify-center text-2xl shadow-lg"
                 [class]="item.gradient">
              {{ item.icon }}
            </div>
          </div>

          <!-- Text -->
          <div class="relative">
            <h3 class="text-xl font-bold text-white mb-1 group-hover:text-primary-light transition-colors duration-200">
              {{ item.label }}
            </h3>
            <p class="text-sm text-slate-400 group-hover:text-slate-300 transition-colors duration-200">
              {{ item.description }}
            </p>
          </div>

          <!-- Arrow indicator -->
          <div class="absolute top-6 right-6 opacity-0 group-hover:opacity-100 transition-all duration-300 translate-x-2 group-hover:translate-x-0">
            <svg class="w-5 h-5 text-primary-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
            </svg>
          </div>
        </button>
      }
    </div>

    <!-- Footer hint -->
    <p class="text-center text-slate-500 text-sm mt-10">
      Your selection helps us tailor content and recommendations for your role
    </p>
  </div>
</section>
