<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="isScrolled()"
  [class.shadow-lg]="isScrolled()"
  [class.bg-transparent]="!isScrolled()"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3 group" (click)="closeMobileMenu()">
        <img src="npiaiLogo.png" alt="NPI AI Academy" class="w-10 h-10 rounded-xl shadow-lg group-hover:shadow-primary/40 transition-shadow duration-300 object-cover">
        <div>
          <span class="text-xl font-bold tracking-tight" [class.text-dark]="isScrolled()" [class.text-white]="!isScrolled()">
            NPI <span class="text-primary">AI</span> Academy
          </span>
          <p class="text-xs font-medium -mt-1" [class.text-slate-500]="isScrolled()" [class.text-slate-300]="!isScrolled()">
            Turning AI Knowledge into Action.
          </p>
        </div>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-1">
        <a routerLink="/"
           routerLinkActive="nav-active"
           [routerLinkActiveOptions]="{exact: true}"
           class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
           [class.text-slate-700]="isScrolled()"
           [class.text-white]="!isScrolled()"
           [class.hover:bg-slate-100]="isScrolled()"
           [class.hover:bg-white/10]="!isScrolled()">
          Home
        </a>
        <a routerLink="/pair-programming"
           routerLinkActive="nav-active"
           class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
           [class.text-slate-700]="isScrolled()"
           [class.text-white]="!isScrolled()"
           [class.hover:bg-slate-100]="isScrolled()"
           [class.hover:bg-white/10]="!isScrolled()">
          Pair Programming
        </a>
        <a routerLink="/presentations"
           routerLinkActive="nav-active"
           class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
           [class.text-slate-700]="isScrolled()"
           [class.text-white]="!isScrolled()"
           [class.hover:bg-slate-100]="isScrolled()"
           [class.hover:bg-white/10]="!isScrolled()">
          Presentations
        </a>
        <a routerLink="/about"
           routerLinkActive="nav-active"
           class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
           [class.text-slate-700]="isScrolled()"
           [class.text-white]="!isScrolled()"
           [class.hover:bg-slate-100]="isScrolled()"
           [class.hover:bg-white/10]="!isScrolled()">
          About
        </a>
        <a routerLink="/contributors"
           routerLinkActive="nav-active"
           class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200"
           [class.text-slate-700]="isScrolled()"
           [class.text-white]="!isScrolled()"
           [class.hover:bg-slate-100]="isScrolled()"
           [class.hover:bg-white/10]="!isScrolled()">
          Contributors
        </a>
      </div>

      <!-- CTA + Mobile Toggle -->
      <div class="flex items-center gap-3">
        <a routerLink="/get-started"
           class="hidden md:inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-primary to-primary-dark text-white text-sm font-semibold rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:scale-105 transition-all duration-200">
          Get Started
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </a>

        <!-- Mobile Menu Button -->
        <button
          class="md:hidden p-2 rounded-lg transition-colors"
          [class.text-slate-700]="isScrolled()"
          [class.text-white]="!isScrolled()"
          [class.hover:bg-slate-100]="isScrolled()"
          [class.hover:bg-white/10]="!isScrolled()"
          (click)="toggleMobileMenu()">
          @if (!isMobileMenuOpen()) {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          } @else {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen()) {
    <div class="md:hidden bg-white border-t border-slate-100 shadow-xl animate-slideDown">
      <div class="px-4 py-3 space-y-1">
        <a routerLink="/" (click)="closeMobileMenu()"
           routerLinkActive="bg-primary/10 text-primary"
           [routerLinkActiveOptions]="{exact: true}"
           class="block px-4 py-3 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Home
        </a>
        <a routerLink="/pair-programming" (click)="closeMobileMenu()"
           routerLinkActive="bg-primary/10 text-primary"
           class="block px-4 py-3 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Pair Programming
        </a>
        <a routerLink="/presentations" (click)="closeMobileMenu()"
           routerLinkActive="bg-primary/10 text-primary"
           class="block px-4 py-3 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Presentations
        </a>
        <a routerLink="/about" (click)="closeMobileMenu()"
           routerLinkActive="bg-primary/10 text-primary"
           class="block px-4 py-3 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          About
        </a>
        <a routerLink="/contributors" (click)="closeMobileMenu()"
           routerLinkActive="bg-primary/10 text-primary"
           class="block px-4 py-3 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-50 transition-colors">
          Contributors
        </a>
        <div class="pt-2 pb-1">
          <a routerLink="/get-started" (click)="closeMobileMenu()"
             class="block w-full text-center px-5 py-3 bg-gradient-to-r from-primary to-primary-dark text-white text-sm font-semibold rounded-xl shadow-lg">
            Get Started
          </a>
        </div>
      </div>
    </div>
  }
</nav>
