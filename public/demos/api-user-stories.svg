  <text x="155" y="189" fill="#64748b" font-family="monospace" font-size="10">string</text>
  <rect x="55" y="202" width="190" height="22" rx="4" fill="#0f172a" opacity="0.7"/>
  <text x="65" y="217" fill="#94a3b8" font-family="monospace" font-size="10">LastName</text>
  <text x="155" y="217" fill="#64748b" font-family="monospace" font-size="10">string</text>
  <rect x="55" y="230" width="190" height="22" rx="4" fill="#0f172a" opacity="0.7"/>
