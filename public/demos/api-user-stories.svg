  <text x="580" y="180" fill="#c4b5fd" font-family="sans-serif" font-size="9">├ MS GET User Story</text>
  <text x="580" y="193" fill="#64748b" font-family="sans-serif" font-size="8">  Description • AC • Tech Req</text>
  <rect x="570" y="206" width="175" height="35" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="580" y="221" fill="#c4b5fd" font-family="sans-serif" font-size="9">├ Gateway GET User Story</text>
  <text x="580" y="234" fill="#64748b" font-family="sans-serif" font-size="8">  Description • AC • Tech Req</text>
  <rect x="570" y="247" width="175" height="35" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="580" y="262" fill="#c4b5fd" font-family="sans-serif" font-size="9">├ MS PUT User Story</text>
  <text x="580" y="275" fill="#64748b" font-family="sans-serif" font-size="8">  Description • AC • Tech Req</text>
  <rect x="570" y="288" width="175" height="28" rx="5" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1"/>
  <text x="657" y="306" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="9" font-weight="bold">✅ Auto-created via MCP</text>
  <!-- Title -->
  <text x="400" y="380" text-anchor="middle" fill="white" font-family="sans-serif" font-size="22" font-weight="bold">Creating API User Stories</text>
  <text x="400" y="402" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13">Windsurf Workflow • Template-Based Generation</text>
  <!-- Tag -->
  <rect x="40" y="345" width="130" height="28" rx="14" fill="#f59e0b" opacity="0.2"/>
  <text x="105" y="364" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="12" font-weight="bold">📋 Windsurf</text>
