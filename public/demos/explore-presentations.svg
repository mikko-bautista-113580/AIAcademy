<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <circle cx="700" cy="80" r="160" fill="white" opacity="0.04"/>
  <circle cx="100" cy="320" r="130" fill="white" opacity="0.03"/>
  <!-- Slide deck mockups — 3 cards evenly spaced -->
  <!-- Slide 1: AI Models -->
  <rect x="40" y="40" width="220" height="145" rx="10" fill="white" opacity="0.12" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <text x="150" y="68" text-anchor="middle" fill="white" opacity="0.8" font-family="sans-serif" font-size="11" font-weight="bold">📊 AI Models Comparison</text>
  <rect x="55" y="78" width="75" height="7" rx="2" fill="white" opacity="0.15"/>
  <rect x="55" y="90" width="55" height="7" rx="2" fill="white" opacity="0.1"/>
  <!-- Mini bar chart — contained inside card (x 40..260) -->
  <rect x="145" y="100" width="11" height="32" rx="2" fill="white" opacity="0.20"/>
  <rect x="160" y="88"  width="11" height="44" rx="2" fill="white" opacity="0.25"/>
  <rect x="175" y="106" width="11" height="26" rx="2" fill="white" opacity="0.15"/>
  <rect x="190" y="96"  width="11" height="36" rx="2" fill="white" opacity="0.20"/>
  <rect x="205" y="110" width="11" height="22" rx="2" fill="white" opacity="0.12"/>
  <text x="150" y="163" text-anchor="middle" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">25 slides • GPT-4, Claude, Gemini</text>
  <!-- Slide 2: Workflow Creator -->
  <rect x="290" y="40" width="220" height="145" rx="10" fill="white" opacity="0.12" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <text x="400" y="68" text-anchor="middle" fill="white" opacity="0.8" font-family="sans-serif" font-size="11" font-weight="bold">🔧 Workflow Creator</text>
  <rect x="305" y="78" width="75" height="7" rx="2" fill="white" opacity="0.15"/>
  <rect x="305" y="90" width="55" height="7" rx="2" fill="white" opacity="0.1"/>
  <!-- Mini flow — contained inside card (x 290..510) -->
  <rect x="380" y="88"  width="55" height="16" rx="3" fill="white" opacity="0.12"/>
  <line x1="435" y1="96" x2="448" y2="96" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="445,92 452,96 445,100" fill="white" opacity="0.3"/>
  <rect x="380" y="112" width="55" height="16" rx="3" fill="white" opacity="0.10"/>
  <line x1="435" y1="120" x2="448" y2="120" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <polygon points="445,116 452,120 445,124" fill="white" opacity="0.3"/>
  <rect x="380" y="136" width="55" height="16" rx="3" fill="white" opacity="0.08"/>
  <text x="400" y="163" text-anchor="middle" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">10 slides • Automation &amp; AI Agents</text>
  <!-- Slide 3: GW Endpoint Generator — fixed, all elements inside (x 540..760) -->
  <rect x="540" y="40" width="220" height="145" rx="10" fill="white" opacity="0.12" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <text x="650" y="68" text-anchor="middle" fill="white" opacity="0.8" font-family="sans-serif" font-size="11" font-weight="bold">🌐 GW Endpoint Generator</text>
  <rect x="555" y="78" width="75" height="7" rx="2" fill="white" opacity="0.15"/>
  <rect x="555" y="90" width="55" height="7" rx="2" fill="white" opacity="0.1"/>
  <!-- Mini code block — contained inside card -->
  <rect x="638" y="86" width="105" height="60" rx="4" fill="white" opacity="0.08"/>
  <rect x="646" y="95"  width="60" height="5" rx="1" fill="white" opacity="0.15"/>
  <rect x="646" y="105" width="48" height="5" rx="1" fill="white" opacity="0.10"/>
  <rect x="646" y="115" width="66" height="5" rx="1" fill="white" opacity="0.12"/>
  <rect x="646" y="125" width="42" height="5" rx="1" fill="white" opacity="0.08"/>
  <rect x="646" y="135" width="55" height="5" rx="1" fill="white" opacity="0.10"/>
  <text x="650" y="163" text-anchor="middle" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">8 slides • Code Generation</text>
  <!-- More slides row — 4 pills, evenly distributed -->
  <rect x="55"  y="203" width="155" height="32" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.12"/>
  <text x="133" y="223" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="9">🧪 Test Case Association</text>
  <rect x="228" y="203" width="155" height="32" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.12"/>
  <text x="306" y="223" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="9">🗺️ PR Roadmap</text>
  <rect x="401" y="203" width="155" height="32" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.12"/>
  <text x="479" y="223" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="9">📈 Time Estimation</text>
  <rect x="574" y="203" width="155" height="32" rx="8" fill="white" opacity="0.08" stroke="white" stroke-width="1" stroke-opacity="0.12"/>
  <text x="652" y="223" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="9">➕ And More...</text>
  <!-- Title -->
  <text x="400" y="272" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">Presentations</text>
  <text x="400" y="297" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="13">AI model comparisons, workflows, and best practices</text>
  <!-- Badge -->
  <rect x="325" y="316" width="150" height="26" rx="13" fill="white" opacity="0.15"/>
  <text x="400" y="334" text-anchor="middle" fill="white" opacity="0.9" font-family="sans-serif" font-size="11" font-weight="bold">📑 Browse Slides</text>
</svg>
