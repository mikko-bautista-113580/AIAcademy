  <text x="60" y="115" fill="#94a3b8" font-family="monospace" font-size="8">📁 Gateway.API</text>
  <text x="72" y="128" fill="#94a3b8" font-family="monospace" font-size="8">📁 Controllers</text>
  <text x="72" y="141" fill="#94a3b8" font-family="monospace" font-size="8">📁 Models</text>
  <text x="72" y="154" fill="#94a3b8" font-family="monospace" font-size="8">📁 Services</text>
  <text x="60" y="170" fill="#94a3b8" font-family="monospace" font-size="8">📁 Microservice.API</text>
  <text x="72" y="183" fill="#94a3b8" font-family="monospace" font-size="8">📁 Queries</text>
