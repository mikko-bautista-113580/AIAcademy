  <rect x="40" y="270" width="710" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="60" y="292" fill="#c4b5fd" font-family="sans-serif" font-size="10" font-weight="bold">🏢 Legacy .NET Framework Enterprise Project</text>
  <text x="60" y="308" fill="#64748b" font-family="sans-serif" font-size="9">Dual IDE Strategy: Visual Studio for build/publish/debug + Windsurf for AI-powered workflows and automation</text>
  <!-- Arrows connecting -->
  <line x1="270" y1="220" x2="320" y2="220" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="550" y1="155" x2="590" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Title -->
  <text x="400" y="365" text-anchor="middle" fill="white" font-family="sans-serif" font-size="22" font-weight="bold">Pair Programming — Mark Echon</text>
  <text x="400" y="387" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13">Dual IDE • .NET Framework • Windsurf Workflows • MCP + Azure DevOps</text>
  <!-- Date badge -->
  <rect x="310" y="400" width="180" height="24" rx="12" fill="#3b82f6" opacity="0.15"/>
  <text x="400" y="416" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="10">📅 November 12, 2025</text>
