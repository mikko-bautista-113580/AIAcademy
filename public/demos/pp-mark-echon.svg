  <rect x="40" y="55" width="230" height="200" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="40" y="55" width="230" height="28" rx="10" fill="#334155"/>
  <rect x="40" y="73" width="230" height="10" fill="#334155"/>
  <circle cx="58" cy="69" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="72" cy="69" r="4" fill="#eab308" opacity="0.8"/>
  <circle cx="86" cy="69" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="155" y="72" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Visual Studio</text>
