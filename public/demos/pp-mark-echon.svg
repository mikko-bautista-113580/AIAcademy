  <rect x="605" y="108" width="140" height="25" rx="4" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="0.8"/>
  <text x="615" y="118" fill="#86efac" font-family="sans-serif" font-size="7" font-weight="bold">Feature</text>
  <text x="615" y="128" fill="#64748b" font-family="sans-serif" font-size="7">API Endpoint - GET</text>
  <rect x="605" y="138" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="615" y="148" fill="#93c5fd" font-family="sans-serif" font-size="7" font-weight="bold">User Story</text>
  <text x="615" y="158" fill="#64748b" font-family="sans-serif" font-size="7">MS GET Tracking Data</text>
  <rect x="605" y="168" width="140" height="25" rx="4" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="615" y="178" fill="#93c5fd" font-family="sans-serif" font-size="7" font-weight="bold">User Story</text>
  <text x="615" y="188" fill="#64748b" font-family="sans-serif" font-size="7">GW GET Tracking Data</text>
  <rect x="605" y="198" width="140" height="25" rx="4" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="615" y="208" fill="#fbbf24" font-family="sans-serif" font-size="7" font-weight="bold">Template</text>
  <text x="615" y="218" fill="#64748b" font-family="sans-serif" font-size="7">Standardized Format</text>
