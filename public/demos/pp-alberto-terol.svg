<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="200" cy="200" r="180" fill="#10b981" opacity="0.06"/>
  <circle cx="600" cy="150" r="150" fill="#06b6d4" opacity="0.05"/>
  <!-- Title bar -->
  <rect x="40" y="50" width="720" height="35" rx="8" fill="#10b981" opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="72" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="12" font-weight="bold">📋 Business Analyst Workflow — Requirements to Backlog</text>
  <!-- Step 1: Epic/Requirements from PO -->
  <rect x="40" y="105" width="170" height="150" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="40" y="105" width="170" height="26" rx="10" fill="#8b5cf6" opacity="0.15"/>
  <rect x="40" y="121" width="170" height="10" fill="#8b5cf6" opacity="0.15"/>
  <text x="125" y="122" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="9" font-weight="bold">1. Product Owner</text>
  <text x="125" y="150" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="28">📨</text>
  <text x="55" y="175" fill="#94a3b8" font-family="sans-serif" font-size="9">Epic with requirements</text>
  <text x="55" y="190" fill="#94a3b8" font-family="sans-serif" font-size="9">Business objectives</text>
  <text x="55" y="205" fill="#94a3b8" font-family="sans-serif" font-size="9">Acceptance criteria</text>
  <rect x="55" y="215" width="140" height="18" rx="3" fill="#8b5cf6" opacity="0.1"/>
  <text x="65" y="228" fill="#c4b5fd" font-family="sans-serif" font-size="8">ADO Epic → BA Review</text>
  <!-- Arrow -->
  <line x1="210" y1="180" x2="240" y2="180" stroke="#64748b" stroke-width="2"/>
  <polygon points="236,175 246,180 236,185" fill="#64748b"/>
  <!-- Step 2: Figma Design Review -->
  <rect x="250" y="105" width="170" height="150" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <rect x="250" y="105" width="170" height="26" rx="10" fill="#ec4899" opacity="0.15"/>
  <rect x="250" y="121" width="170" height="10" fill="#ec4899" opacity="0.15"/>
  <text x="335" y="122" text-anchor="middle" fill="#f9a8d4" font-family="sans-serif" font-size="9" font-weight="bold">2. Figma Designs</text>
  <text x="335" y="150" text-anchor="middle" fill="#f9a8d4" font-family="sans-serif" font-size="28">🎨</text>
  <text x="265" y="175" fill="#94a3b8" font-family="sans-serif" font-size="9">UI/UX mockups</text>
  <text x="265" y="190" fill="#94a3b8" font-family="sans-serif" font-size="9">Screen flows</text>
  <text x="265" y="205" fill="#94a3b8" font-family="sans-serif" font-size="9">Component specs</text>
  <rect x="265" y="215" width="140" height="18" rx="3" fill="#ec4899" opacity="0.1"/>
  <text x="275" y="228" fill="#f9a8d4" font-family="sans-serif" font-size="8">Compare vs Requirements</text>
  <!-- Arrow -->
  <line x1="420" y1="180" x2="450" y2="180" stroke="#64748b" stroke-width="2"/>
  <polygon points="446,175 456,180 446,185" fill="#64748b"/>
  <!-- Step 3: Manual → AI Creation -->
  <rect x="460" y="105" width="170" height="150" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <rect x="460" y="105" width="170" height="26" rx="10" fill="#10b981" opacity="0.15"/>
  <rect x="460" y="121" width="170" height="10" fill="#10b981" opacity="0.15"/>
  <text x="545" y="122" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="9" font-weight="bold">3. Create Stories</text>
  <!-- Manual vs AI comparison -->
  <rect x="475" y="140" width="60" height="55" rx="5" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="0.8"/>
  <text x="505" y="155" text-anchor="middle" fill="#fca5a5" font-family="sans-serif" font-size="8" font-weight="bold">Manual</text>
  <text x="505" y="168" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="7">Copy templates</text>
  <text x="505" y="180" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="7">Edit fields</text>
  <text x="505" y="192" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="7">❌ Slow</text>
  <text x="545" y="168" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="14">→</text>
  <rect x="555" y="140" width="60" height="55" rx="5" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="0.8"/>
  <text x="585" y="155" text-anchor="middle" fill="#86efac" font-family="sans-serif" font-size="8" font-weight="bold">AI</text>
  <text x="585" y="168" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="7">Auto-analyze</text>
  <text x="585" y="180" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="7">Auto-generate</text>
  <text x="585" y="192" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="7">✅ Fast</text>
  <rect x="475" y="203" width="140" height="28" rx="4" fill="#10b981" opacity="0.1"/>
  <text x="545" y="215" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="8" font-weight="bold">🤖 Windsurf AI</text>
  <text x="545" y="226" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="7">Req vs Design Analysis</text>
  <!-- Arrow -->
  <line x1="630" y1="180" x2="660" y2="180" stroke="#64748b" stroke-width="2"/>
  <polygon points="656,175 666,180 656,185" fill="#64748b"/>
  <!-- Step 4: Backlog -->
  <rect x="670" y="115" width="90" height="130" rx="10" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="715" y="142" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="9" font-weight="bold">Backlog</text>
  <rect x="680" y="150" width="70" height="16" rx="3" fill="#0f172a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="688" y="161" fill="#86efac" font-family="sans-serif" font-size="7">✅ API Story</text>
  <rect x="680" y="170" width="70" height="16" rx="3" fill="#0f172a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="688" y="181" fill="#86efac" font-family="sans-serif" font-size="7">✅ UI Story</text>
  <rect x="680" y="190" width="70" height="16" rx="3" fill="#0f172a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="688" y="201" fill="#86efac" font-family="sans-serif" font-size="7">✅ Feature</text>
  <rect x="680" y="210" width="70" height="16" rx="3" fill="#0f172a" stroke="#22c55e" stroke-width="0.8"/>
  <text x="688" y="221" fill="#86efac" font-family="sans-serif" font-size="7">✅ Test Case</text>
  <!-- Bottom: Key outcomes -->
  <rect x="40" y="275" width="350" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="60" y="298" fill="#6ee7b7" font-family="sans-serif" font-size="11" font-weight="bold">📝 User Story Types Created</text>
  <rect x="55" y="306" width="70" height="18" rx="4" fill="#3b82f6" opacity="0.1"/>
  <text x="90" y="319" text-anchor="middle" fill="#93c5fd" font-family="sans-serif" font-size="8">API Stories</text>
  <rect x="133" y="306" width="65" height="18" rx="4" fill="#ec4899" opacity="0.1"/>
  <text x="165" y="319" text-anchor="middle" fill="#f9a8d4" font-family="sans-serif" font-size="8">UI Stories</text>
  <rect x="206" y="306" width="70" height="18" rx="4" fill="#8b5cf6" opacity="0.1"/>
  <text x="241" y="319" text-anchor="middle" fill="#c4b5fd" font-family="sans-serif" font-size="8">Features</text>
  <rect x="284" y="306" width="85" height="18" rx="4" fill="#f59e0b" opacity="0.1"/>
  <text x="326" y="319" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="8">Test Scenarios</text>
  <text x="60" y="343" fill="#64748b" font-family="sans-serif" font-size="8">All auto-generated from requirements + Figma designs</text>
  <!-- Bottom right -->
  <rect x="410" y="275" width="350" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="430" y="298" fill="#6ee7b7" font-family="sans-serif" font-size="11" font-weight="bold">🚀 Key Benefits</text>
  <text x="430" y="316" fill="#94a3b8" font-family="sans-serif" font-size="9">✅ Automated requirements vs design comparison</text>
  <text x="430" y="332" fill="#94a3b8" font-family="sans-serif" font-size="9">✅ Reduced manual documentation effort</text>
  <text x="430" y="348" fill="#94a3b8" font-family="sans-serif" font-size="9">✅ Consistent story format across API and UI</text>
  <!-- Title -->
  <text x="400" y="395" text-anchor="middle" fill="white" font-family="sans-serif" font-size="22" font-weight="bold">Pair Programming — Alberto Terol</text>
  <text x="400" y="417" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="13">BA Workflow • Requirements Analysis • Figma + AI • Auto-Generate Stories</text>
  <!-- Date badge -->
  <rect x="310" y="427" width="180" height="24" rx="12" fill="#10b981" opacity="0.15"/>
  <text x="400" y="443" text-anchor="middle" fill="#6ee7b7" font-family="sans-serif" font-size="10">📅 November 10, 2025</text>
</svg>
