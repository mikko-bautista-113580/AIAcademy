  <!-- IDE 1 -->
  <rect x="60" y="45" width="320" height="170" rx="12" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="60" y="45" width="320" height="25" rx="12" fill="white" opacity="0.08"/>
  <rect x="60" y="60" width="320" height="10" fill="white" opacity="0.08"/>
