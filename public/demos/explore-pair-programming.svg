  <text x="85" y="193" fill="white" opacity="0.5" font-family="monospace" font-size="7">🤖 Cascade is typing...</text>
  <!-- IDE 2 -->
  <rect x="420" y="45" width="320" height="170" rx="12" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
