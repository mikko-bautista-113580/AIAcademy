  <circle cx="462" cy="58" r="4" fill="#22c55e" opacity="0.6"/>
  <text x="580" y="61" text-anchor="middle" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">Developer B — Visual Studio</text>
  <!-- Code lines -->
  <rect x="435" y="80" width="170" height="8" rx="2" fill="white" opacity="0.1"/>
  <rect x="435" y="94" width="220" height="8" rx="2" fill="white" opacity="0.07"/>
  <rect x="435" y="108" width="150" height="8" rx="2" fill="white" opacity="0.11"/>
