  <text x="400" y="310" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="bold">Pair Programming Sessions</text>
  <text x="400" y="335" text-anchor="middle" fill="white" opacity="0.7" font-family="sans-serif" font-size="13">Live AI-assisted development collaboration</text>
