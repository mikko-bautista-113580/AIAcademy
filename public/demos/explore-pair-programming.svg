  <text x="165" y="260" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">Dual IDE • MCP Workflows</text>
  <rect x="320" y="230" width="180" height="40" rx="8" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="345" cy="250" r="12" fill="white" opacity="0.15"/>
  <text x="345" y="254" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="10">🤝</text>
  <text x="365" y="246" fill="white" opacity="0.8" font-family="sans-serif" font-size="9" font-weight="bold">Armando Lopez Jr.</text>
  <text x="365" y="260" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">Bug Investigation • AI Models</text>
  <rect x="520" y="230" width="180" height="40" rx="8" fill="white" opacity="0.1" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="545" cy="250" r="12" fill="white" opacity="0.15"/>
  <text x="545" y="254" text-anchor="middle" fill="white" opacity="0.6" font-family="sans-serif" font-size="10">💻</text>
  <text x="565" y="246" fill="white" opacity="0.8" font-family="sans-serif" font-size="9" font-weight="bold">Alberto Terol</text>
  <text x="565" y="260" fill="white" opacity="0.5" font-family="sans-serif" font-size="8">BA Workflow • Auto Stories</text>
